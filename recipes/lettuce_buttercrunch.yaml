crop: lettuce_buttercrunch
version: 1
phases:
  - name: germination
    duration_days: 4
    setpoints: { ec_ms_cm: 0.8, ph: 6.0, air_c: 21, rh_pct: 70, moisture_pct: 80 }
    light:     { hours_on: 16, ppfd: 120 }
    transition: time_only
  - name: seedling
    duration_days: 7
    setpoints: { ec_ms_cm: 1.0, ph: 6.0, air_c: 21, rh_pct: 65, moisture_pct: 70 }
    light:     { hours_on: 16, ppfd: 180 }
    transition: time_or_vision
    vision_gate: { phase_estimate: seedling, leaf_area_cm2_min: 12 }
  - name: vegetative
    duration_days: 21
    setpoints: { ec_ms_cm: 1.4, ph: 6.0, air_c: 20, rh_pct: 60, moisture_pct: 65 }
    light:     { hours_on: 14, ppfd: 250 }
    transition: time_or_vision
    vision_gate: { phase_estimate: veg_late, leaf_area_cm2_min: 180 }
harvest:
  ready_when:
    days_since_start_min: 32
    vision: { leaf_area_cm2_min: 220, color_health_min: 0.85 }
  notify: "Lettuce on shelf {shelf_id} ready to harvest"
