crop: basil_genovese
version: 1
phases:
  - name: germination
    duration_days: 6
    setpoints: { ec_ms_cm: 0.8, ph: 6.0, air_c: 24, rh_pct: 70, moisture_pct: 80 }
    light:     { hours_on: 16, ppfd: 120 }
    transition: time_only
  - name: seedling
    duration_days: 10
    setpoints: { ec_ms_cm: 1.2, ph: 6.0, air_c: 24, rh_pct: 65, moisture_pct: 70 }
    light:     { hours_on: 16, ppfd: 220 }
    transition: time_or_vision
    vision_gate: { phase_estimate: seedling, leaf_area_cm2_min: 14 }
  - name: vegetative
    duration_days: 28
    setpoints: { ec_ms_cm: 1.6, ph: 6.0, air_c: 23, rh_pct: 60, moisture_pct: 65 }
    light:     { hours_on: 14, ppfd: 320 }
    transition: time_or_vision
    vision_gate: { phase_estimate: veg_late, leaf_area_cm2_min: 200 }
harvest:
  ready_when:
    days_since_start_min: 40
    vision: { leaf_area_cm2_min: 240, color_health_min: 0.85 }
  notify: "Basil on shelf {shelf_id} ready to harvest"
