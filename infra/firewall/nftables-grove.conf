# GroveOS air-gap firewall.
# Drops ALL outbound traffic except mDNS on the LAN. The UI listens on the
# LAN for local clients; nothing ever leaves the LAN.

table inet grove {
  chain output {
    type filter hook output priority 0; policy drop;

    ct state established,related accept

    # Loopback (NATS, UI <-> backend, VictoriaMetrics)
    oif "lo" accept

    # mDNS / Avahi for grove.local discovery
    udp dport 5353 ip daddr 224.0.0.251 accept
    udp dport 5353 ip6 daddr ff02::fb accept

    # DHCP renew
    udp dport 67 accept
    udp dport 68 accept

    # NTP is intentionally NOT allowed. Time is set from a local RTC.
    # All other egress is dropped.
    log prefix "grove-egress-drop: " level warn
  }

  chain input {
    type filter hook input priority 0; policy drop;
    ct state established,related accept
    iif "lo" accept

    # mDNS
    udp dport 5353 accept

    # UI on LAN
    tcp dport 8080 accept

    # SSH from local subnet only (operators)
    ip saddr 192.168.0.0/16 tcp dport 22 accept
  }
}
